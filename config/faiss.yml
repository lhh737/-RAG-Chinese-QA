# FAISS 向量库与检索（替代原 Chroma 配置）
persist_directory: faiss_db
index_name: faiss_index

# 父子分块：父块用于上下文还原，子块用于向量/BM25 检索
parent_chunk_size: 1200
parent_chunk_overlap: 150
child_chunk_size: 400
child_chunk_overlap: 40
separators: ["\n\n", "\n", "。", ".", "！", "？", "!", "?", " ", ""]

# 混合检索：向量召回条数、BM25 召回条数（合并去重后送 Reranker）
vector_fetch_k: 24
bm25_fetch_k: 24
rerank_top_n: 12
# 动态 TopK：最终送入模型的父文档块数（基础上限，实际由 hybrid_retriever 动态裁剪）
base_context_k: 4
max_context_k: 8

data_path: data
upload_path: data/uploads
md5_hex_store: md5.txt
allow_knowledge_file_type: ["txt", "pdf"]
